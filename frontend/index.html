<div id="tool-view-calculadora" class="folder-subview tools-workspace">
    <div class="sidebar">
        <div class="sidebar-content">
            <h3 style="font-size: 14px; margin-bottom: 20px;">Configuración de Pliego (58x100 cm)</h3>
            
            <div class="control-group">
                <label>Nombre del Diseño:</label>
                <input type="text" id="designName" class="input-field" placeholder="Ej. Logo Frente">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="control-group" style="flex:1;">
                    <label>Ancho (cm):</label>
                    <input type="number" id="itemWidth" class="input-field" value="10">
                </div>
                <div class="control-group" style="flex:1;">
                    <label>Alto (cm):</label>
                    <input type="number" id="itemHeight" class="input-field" value="10">
                </div>
            </div>
            <button class="btn-primary" onclick="addToSheet()">Añadir al Pliego +</button>
        </div>
        <div class="sidebar-footer">
            <div class="calc-row"><span>Total diseños:</span> <span id="totalItems">0</span></div>
            <div class="calc-row" style="font-size: 18px; color: var(--accent-green);"><span>Total:</span> <span id="grandTotal">$0.00</span></div>
        </div>
    </div>
    
    <div class="main-view" style="flex-direction: column;">
        <div id="sheetVisual" style="width: 290px; height: 500px; border: 2px dashed #444; background: #000; position: relative;">
            </div>
        <p style="color: var(--text-muted); font-size: 12px; margin-top: 10px;">Simulador visual de pliego (58x100 cm)</p>
    </div>
</div>

<script>
let designs = [];
const PRICE_PER_METER = 300; // Ajusta a tu precio

function addToSheet() {
    const name = document.getElementById('designName').value || "Diseño";
    const w = parseFloat(document.getElementById('itemWidth').value);
    const h = parseFloat(document.getElementById('itemHeight').value);
    
    if(w > 58) return alert("El ancho supera los 58cm del pliego.");
    
    designs.push({name, w, h});
    updateSheet();
}

function updateSheet() {
    const container = document.getElementById('sheetVisual');
    container.innerHTML = '';
    let totalArea = 0;
    
    designs.forEach(d => {
        const div = document.createElement('div');
        div.style.cssText = `width:${(d.w/58)*100}%; height:${(d.h/100)*100}%; background:var(--accent-blue); position:absolute; border:1px solid #fff; font-size:8px; overflow:hidden;`;
        div.innerText = d.name;
        container.appendChild(div);
        totalArea += (d.w * d.h);
    });
    
    document.getElementById('totalItems').innerText = designs.length;
    // Cálculo simplificado de costo basado en área total
    const cost = (totalArea / (58*100)) * PRICE_PER_METER;
    document.getElementById('grandTotal').innerText = `$${cost.toFixed(2)}`;
}
</script>
