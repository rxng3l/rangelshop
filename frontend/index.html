<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RangelShop — Plataforma DTF Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #09090b;
    --bg-card: #141416;
    --border-color: #232326;
    --text-white: #f4f4f5;
    --text-muted: #a1a1aa;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-green: #10b981;
}

body {
    margin:0;
    font-family: Inter;
    background: var(--bg-dark);
    color: var(--text-white);
}

/* NAV */
.navbar{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    border-bottom:1px solid var(--border-color);
}

.nav-brand{
    display:flex;
    gap:10px;
    align-items:center;
}

/* LAYOUT */
.app-container{margin-top:70px}

/* CALCULADORA */
.tools-workspace{display:flex;height:650px}

.sidebar{
    width:340px;
    background:var(--bg-card);
    padding:20px;
}

.main-view{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.calc-results-box{
    background:var(--bg-card);
    padding:30px;
    border-radius:12px;
    width:420px;
}

.calc-row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.calc-total{
    color:var(--accent-green);
    font-size:22px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0 15px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:var(--accent-blue);
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="nav-brand">
        <img src="logo.png" width="40">
        <b>RangelShop</b>
    </div>
</div>

<div class="app-container">

<div class="tools-workspace">

<!-- SIDEBAR -->
<div class="sidebar">

<label>Ancho (cm)</label>
<input id="calcWidth" type="number" value="30" oninput="calculateDtfCost()">

<label>Alto (cm)</label>
<input id="calcHeight" type="number" value="40" oninput="calculateDtfCost()">

<label>Precio metro</label>
<input id="calcPricePerMeter" type="number" value="180" oninput="calculateDtfCost()">

<!-- 🔥 NUEVO -->
<label>Diseños por metro</label>
<input id="calcDesigns" type="number" value="3" oninput="calculateDtfCost()">

<label>Precio playera</label>
<input id="calcShirtPrice" type="number" value="80" oninput="calculateDtfCost()">

</div>

<!-- MAIN -->
<div class="main-view">

<div class="calc-results-box">

<div class="calc-row">
<span>Área</span>
<span id="resArea">0</span>
</div>

<div class="calc-row">
<span>Metros</span>
<span id="resFraction">0</span>
</div>

<div class="calc-row">
<span>Total metro</span>
<span id="resTotal">$0</span>
</div>

<!-- NUEVO -->
<div class="calc-row">
<span>Por diseño</span>
<span id="resPerDesign">$0</span>
</div>

<div class="calc-row">
<span>Total final</span>
<span id="resFinal">$0</span>
</div>

</div>

</div>

</div>

<script>

function calculateDtfCost(){

const w = parseFloat(document.getElementById("calcWidth").value)||0;
const h = parseFloat(document.getElementById("calcHeight").value)||0;
const price = parseFloat(document.getElementById("calcPricePerMeter").value)||0;

const designs = parseInt(document.getElementById("calcDesigns").value)||1;
const shirt = parseFloat(document.getElementById("calcShirtPrice").value)||0;

const area = w*h;
document.getElementById("resArea").innerText = area+" cm²";

let m = h/100;
if(w>58) m = Math.max(w,h)/100;

const total = m * price;
const perDesign = total / designs;
const finalPrice = perDesign + shirt;

document.getElementById("resFraction").innerText = m.toFixed(2);
document.getElementById("resTotal").innerText = "$"+total.toFixed(2);
document.getElementById("resPerDesign").innerText = "$"+perDesign.toFixed(2);
document.getElementById("resFinal").innerText = "$"+finalPrice.toFixed(2);

}

calculateDtfCost();

</script>

</body>
</html>
